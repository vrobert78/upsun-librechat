applications:
  librechat:
    type: "composable:25.11"
    stack:
      packages:
        # LibreChat 0.8.5 from unstable — 0.8.0 in 25.11 stable has an incomplete
        # upload path patch that still writes images to the read-only Nix store
        - package: librechat
          channel: unstable

    mounts:
      "/librechat":
        source: local
        source_path: librechat

    relationships:
      mongodb: "database:mongodb"
      # App-to-app relationship: injects RAG_API_HOST, RAG_API_PORT, RAG_API_SCHEME
      rag_api: "rag-api:http"

    web:
      commands:
        start: "bash start.sh"
      upstream:
        socket_family: tcp
        protocol: http
      locations:
        "/":
          passthru: true

    variables:
      env:
        CONFIG_PATH: "/app/librechat.yaml"
        LIBRECHAT_LOG_DIR: "/app/librechat/logs"
        HOST: "0.0.0.0"
        NODE_ENV: "production"
        ALLOW_REGISTRATION: "true"
        ALLOW_SOCIAL_LOGIN: "false"
        # RAG_API_URL is built at runtime in start.sh from the rag_api relationship vars

      # Secrets — do NOT put values here. Set them with:
      #   upsun variable:create --sensitive=true --name=env:CREDS_KEY    --value=$(openssl rand -hex 32)
      #   upsun variable:create --sensitive=true --name=env:CREDS_IV     --value=$(openssl rand -hex 16)
      #   upsun variable:create --sensitive=true --name=env:JWT_SECRET   --value=$(openssl rand -hex 32)
      #   upsun variable:create --sensitive=true --name=env:JWT_REFRESH_SECRET --value=$(openssl rand -hex 32)

  rag-api:
    type: "python:3.12"

    hooks:
      build: |
        set -eu

        echo "==> Cloning rag_api v0.5.0..."
        git clone --depth=1 --branch v0.5.0 https://github.com/danny-avila/rag_api .rag_api

        echo "==> Installing CPU-only torch (avoids the 2GB GPU wheel)..."
        pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

        echo "==> Installing rag_api dependencies + sentence-transformers..."
        pip install sentence-transformers langchain-huggingface -r .rag_api/requirements.lite.txt --quiet

        echo "==> RAG API build done."

    mounts:
      "/uploads":
        source: local
        source_path: rag-uploads
      # HuggingFace model cache — persists across deploys so the model is
      # only downloaded once rather than on every container start
      "/hf-cache":
        source: local
        source_path: hf-cache

    relationships:
      postgres: "pgdb:postgresql"

    web:
      commands:
        start: "bash rag_start.sh"
      upstream:
        socket_family: tcp
        protocol: http
      locations:
        "/":
          passthru: true

    variables:
      env:
        VECTOR_DB_TYPE: "pgvector"
        COLLECTION_NAME: "librechat"
        RAG_UPLOAD_DIR: "/app/uploads"
        HF_HOME: "/app/hf-cache"
        # Embeddings: "huggingface" (local, no key) or "openai" (fast, needs OPENAI_API_KEY)
        # Switch with: upsun variable:set env:EMBEDDINGS_PROVIDER openai
        EMBEDDINGS_PROVIDER: "huggingface"

routes:
  "https://{default}/":
    type: upstream
    upstream: "librechat:http"
  "http://{default}/":
    type: redirect
    to: "https://{default}/"

services:
  database:
    type: mongodb-enterprise:7.0
  pgdb:
    type: postgresql:16
    configuration:
      extensions:
        - vector   # pgvector
